# Small model config (~18M params, depth=6, 144 superpixels)
# Baseline for meaningful representation learning
model:
  img_size: 224
  embed_dims: 256
  num_heads: 4
  depth: 6
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  num_superpixels: 144
  scatter_output: true
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  codebook_size: 1024
  downsample_factor: 16
